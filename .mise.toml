#:schema https://mise.jdx.dev/schema/mise.json

[tools]
go = "1.26"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "2"
"go:github.com/goreleaser/goreleaser/v2" = "2"

[env]
BINARY = "anniversaries-cal"
CONFIG = "anniversaries.hilli.yaml"

[tasks.build]
description = "Build the binary"
sources = ["*.go", "go.mod", "go.sum"]
outputs = ["{{env.BINARY}}"]
run = "go build -o $BINARY ."

[tasks.test]
description = "Run tests"
run = "go test -v ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.run]
description = "Build and run with default config"
depends = ["build"]
run = "./$BINARY -c $CONFIG"

[tasks."run:html"]
description = "Build and generate HTML + iCal output"
depends = ["build"]
run = "./$BINARY -c $CONFIG -html cal.html -ical cal.ics"

[tasks.check]
description = "Lint and test"
depends = ["lint", "test"]

[tasks.clean]
description = "Remove build artifacts"
run = "rm -f $BINARY cal.html cal.ics"

[tasks."release:snapshot"]
description = "Create a snapshot release with goreleaser"
run = "goreleaser release --snapshot --clean"

[tasks.tidy]
description = "Tidy Go modules"
run = "go mod tidy"
