# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

# More examples at https://github.com/goreleaser/goreleaser/blob/main/.goreleaser.yaml

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: anniversaries-cal
    main: ./anniversaries-cal.go
    binary: anniversaries-cal
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s 
      - -w
      
archives:
  - formats: [ tar.gz ]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [ 'zip' ]
    files:
      - README.md
      - LICENSE
      - anniversaries.example.yaml

brews:
  - name: anniversaries-cal
    goarm: 7
    commit_author:
      name: Jens Hilligsøe
      email: github@hilli.dk
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/hilli/anniversaries-cal"
    description: "Generate interesting date calculations from birthdates, events, and marriages"
    license: "MIT"
    url_template: "https://github.com/hilli/anniversaries-cal/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    skip_upload: false
    directory: Formula
    repository:
      owner: hilli
      name: homebrew-tap
      branch: release-anniversaries-cal-{{.Tag}}
      pull_request:
        enabled: true
        draft: false

scoops:
  - repository:
      owner: hilli
      name: scoop-bucket
    homepage: https://github.com/hilli/anniversaries-cal
    description: Generate interesting date calculations from birthdates, events, and marriages
    directory: bucket
    license: MIT

nfpms:
  - file_name_template: "{{ .ConventionalFileName }}"
    id: packages
    homepage: https://github.com/hilli/anniversaries-cal
    description: |-
      Generate interesting date calculations from birthdates, events, and marriages
    maintainer: Jens Hilligsøe <github@hilli.dk>
    license: MIT
    vendor: Jens Hilligsøe
    bindir: /usr/bin
    section: utils
    contents:
      - src: ./anniversaries.example.yaml
        dst: /usr/share/doc/anniversaries-cal/anniversaries.example.yaml
        file_info:
          mode: 0644
      - src: ./LICENSE
        dst: /usr/share/doc/anniversaries-cal/copyright
        file_info:
          mode: 0644
    formats:
      - apk
      - deb
      - rpm
      - archlinux
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

announce:
  mastodon:
    enabled: true
    # Default: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    # message_template: 'kefw2 {{.Tag}} is out! Get it at {{.ReleaseURL}}'
    server: https://mastodon.social

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
